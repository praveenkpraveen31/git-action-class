name: Complete Matrix Testing

on: push

jobs:
  test:
    name: Test ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [16, 18, 20]
        exclude:
          - os: windows-latest
            node: 16
          - os: macos-latest
            node: 16
        include:
          - os: ubuntu-latest
            node: 21-alpha
            experimental: true
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      
      - name: Show environment
        run: |
          echo "OS: ${{ matrix.os }}"
          echo "Node: ${{ matrix.node }}"
          node --version
          npm --version
      
      - run: npm install
      
      - run: npm test
      
      - name: Experimental note
        if: matrix.experimental == true
        run: echo "This is experimental version"