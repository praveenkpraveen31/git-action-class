name: Reusable Test Workflow

on:
  workflow_call:
    inputs:
      test-type:
        required: true
        type: string

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          echo "Running tests: ${{ inputs.test-type }}"