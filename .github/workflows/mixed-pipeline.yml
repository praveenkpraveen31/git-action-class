name: Smart CI/CD Pipeline

on: push

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - run: echo "Compiling code..."
      
      - run: |
          sleep 3
          echo "Build successful"

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      
      - run: echo "Running unit tests..."
      
      - run: |
          sleep 5
          echo "50 tests PASSED"

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      
      - run: echo "Running integration tests..."
      
      - run: |
          sleep 5
          echo "30 tests PASSED"

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      
      - run: echo "Running linter..."
      
      - run: |
          sleep 2
          echo "Code quality: PASSED"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test, lint]
    steps:
      - uses: actions/checkout@v4
      
      - run: echo "Deploying application..."
      
      - run: |
          sleep 2
          echo "Deployment successful"