name: Release on Version Tag

on:
  push:
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      
      - name: Get Release Version
        run: echo "RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
      
      - name: Display Version
        run: echo "Creating Release for Version ${{ env.RELEASE_VERSION }}"
      
      - name: Create GitHub Release
        run: gh release create ${{ env.RELEASE_VERSION }} --title "Release ${{ env.RELEASE_VERSION }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Release Complete
        run: echo "Release ${{ env.RELEASE_VERSION }} created successfully"