name: Release on Version Tag

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version
        run: echo "Version: ${{ github.ref_name }}"
      
      - run: echo "Building release version ${{ github.ref_name }}"
      
      - run: echo "Creating GitHub release"
      
      - run: echo "Release complete"
